{# folder_root.html — main-pane root view (project listing). Rendered by /ui/folder/. #}
<div data-folder-path="">
  <div class="flex items-center justify-between mb-4">
    <h2 class="text-xl font-semibold text-slate-800">Projects</h2>
    <button type="button"
            class="px-3 py-1.5 text-sm bg-slate-800 text-white rounded hover:bg-slate-700"
            onclick="tmsCreateProject()">+ New project</button>
  </div>

  {% if projects %}
  <table class="w-full text-sm border border-slate-200 rounded overflow-hidden bg-white">
    <thead class="bg-slate-100 text-slate-600">
      <tr>
        <th class="text-left px-3 py-2 font-medium">Project</th>
      </tr>
    </thead>
    <tbody>
      {% for name in projects %}
      <tr class="border-t border-slate-100 hover:bg-slate-50 cursor-pointer"
          hx-get="/ui/folder/{{ name }}"
          hx-target="#main-pane"
          hx-swap="innerHTML">
        <td class="px-3 py-2 text-slate-800">{{ name }}</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
  {% else %}
  <div class="text-center py-16 border border-dashed border-slate-200 rounded bg-white">
    <p class="text-slate-500 mb-4">No projects yet.</p>
    <button type="button"
            class="px-4 py-2 bg-slate-800 text-white rounded hover:bg-slate-700"
            onclick="tmsCreateProject()">Create project</button>
  </div>
  {% endif %}
</div>
